# MAX_CHANNEL_MEMBERS=1024 makes the pad-to-MAX value types large ([RegevCiphertext; 1024] alone is
# ~1MB; a BalanceState ~1.3MB), so by-value moves/clones overflow the 2MB default stack of Rust TEST
# threads (main threads get 8MB). Raise the spawned-thread stack for cargo-launched processes
# (tests, bins). wasm has its own 16MB stack via link-args below. A deeper fix (Box the big arrays)
# is tracked in tasks/reg-chain-1024-restructure.md.
[env]
RUST_MIN_STACK = "33554432"

[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "target-feature=+atomics,+bulk-memory",  # Required for multi-threading (SharedArrayBuffer)
    "-C", "target-feature=+simd128",                # SIMD for parallel math on 128-bit vectors
    # NOTE: toggling +simd128 OFF did NOT fix wasm↔native Regev STARK proof portability — the same
    # verifier code returns different results on wasm32 vs native for identical proof+statement
    # bytes (FRI InvalidPowWitness). The divergence is in the upstream BabyBear/plonky3 wasm path,
    # not SIMD. See tasks/wallet-lessons.md "wasm↔native proof portability".
    "-C", "link-arg=--max-memory=4294967296",        # 4GB max WASM linear memory (wasm32 hard limit)
    "-C", "link-args=-z stack-size=16777216",         # 16MB stack (default 1MB is too small for deep recursion)
    '--cfg', 'getrandom_backend="wasm_js"'            # Use JS random source for WASM
]

# NOTE: build-std must be invoked from the WASM build script (see README "WASM Build")
# rather than declared globally here, because [unstable] applies to every cargo
# invocation and conflicts with the host's prebuilt std/panic strategy when
# running native `cargo test`. Use:
#   cargo +nightly build --release -Z build-std=std,panic_abort --target wasm32-unknown-unknown
