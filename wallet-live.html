<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>INTMAX3 Channel Wallet — Live</title>
<style>
  :root { --bg:#0f1419; --panel:#1a2129; --fg:#e6edf3; --muted:#8b949e; --accent:#2f81f7; --ok:#3fb950; --err:#f85149; --border:#30363d; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--bg); color:var(--fg); }
  header { padding:16px 22px; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:baseline; flex-wrap:wrap; }
  h1 { font-size:17px; margin:0; }
  #status { color:var(--muted); } #status.ready { color:var(--ok); }
  main { max-width:760px; margin:0 auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .panel h2 { font-size:13px; margin:0 0 12px; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; }
  .bal { font-size:34px; font-weight:600; }
  .bal small { font-size:13px; color:var(--muted); font-weight:400; }
  label { color:var(--muted); font-size:13px; display:block; margin:10px 0 3px; }
  input { width:100%; background:#0d1117; color:var(--fg); border:1px solid var(--border); border-radius:7px; padding:9px; font:inherit; }
  .row { display:flex; gap:12px; } .row > * { flex:1; }
  button { background:var(--accent); color:#fff; border:0; border-radius:7px; padding:11px 18px; font:inherit; font-weight:600; cursor:pointer; margin-top:12px; width:100%; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  .members { color:var(--muted); font-size:13px; margin-top:8px; }
  #log { background:#0d1117; border:1px solid var(--border); border-radius:10px; padding:12px; height:200px; overflow:auto; white-space:pre-wrap; font-size:13px; }
  .hint { color:var(--muted); font-size:13px; }
  .ok { color:var(--ok); } .err { color:var(--err); }
</style>
</head>
<body>
<header>
  <h1>INTMAX3 Channel Wallet</h1>
  <span id="status">initializing…</span>
  <span class="hint">threads <span id="threads">?</span> · proving runs in your browser</span>
</header>
<main>
  <section class="panel">
    <h2>1 · Join the Intmax channel</h2>
    <div class="row" style="margin-bottom:3px">
      <span class="hint">channel ID</span>
      <span class="hint">faucet (tokens)</span>
    </div>
    <div class="row">
      <input id="joinChannel" type="number" value="7" title="which channel to join" />
      <input id="openBalance" type="number" value="50" readonly title="faucet: the tokens you join with (your share of the channel's deposit-backed fund)" />
    </div>
    <div class="row">
      <button id="btnOpen" disabled>Join</button>
      <button id="btnClear">Clear</button>
    </div>
  </section>

  <section class="panel">
    <h2>2 · Balance</h2>
    <div class="bal"><span id="balance">—</span> <small id="balMeta"></small></div>
    <button id="btnRefresh" disabled>Refresh</button>
  </section>

  <section class="panel">
    <h2>3 · Send</h2>
    <div class="row" style="margin-bottom:3px">
      <span class="hint">channel ID</span>
      <span class="hint">slot</span>
      <span class="hint">amount (tokens)</span>
    </div>
    <div class="row">
      <input id="toChannel" type="number" value="7" title="destination channel ID (same as this channel = intra-channel; different = inter-channel)" />
      <input id="toSlot" type="number" value="0" />
      <input id="amount" type="number" step="0.000001" value="7" />
    </div>
    <button id="btnSend" disabled>Send</button>
  </section>

  <div id="log"></div>
</main>

<script type="module">
const $ = (id) => document.getElementById(id);
const log = (m, cls='') => { const l=$('log'); l.innerHTML += `\n<span class="${cls}">${m}</span>`; l.scrollTop=l.scrollHeight; };
let mySlot = 0;
let myChannel = null;
// The channel id every /api/* call targets (the relay routes ?channel=N to that channel's directory).
// Set when you pick a channel to join, or restored from localStorage; kept in sync with myChannel.
let activeCh = 7;
// Parse this channel's id from a snapshot JSON (record.channelId) and remember it for the UI.
function setChannelFrom(snapJson) {
  try {
    const c = JSON.parse(snapJson).record.channelId;
    myChannel = (c && typeof c === 'object') ? (c.value ?? c.channelId ?? null) : c;
    if (myChannel != null) {
      activeCh = myChannel;
      if ($('toChannel')) $('toChannel').value = myChannel; // default = your own channel (intra)
    }
  } catch (e) {}
}

// Amounts: the protocol stores integer BASE UNITS; 1 token = 10^6 (TOKEN_DECIMALS = 6).
const TOKEN_UNIT = 1000000;
const fmtAmt = (base) => (Number(base) / TOKEN_UNIT).toFixed(6);            // base units -> "x.xxxxxx"
const toBase = (tokens) => String(Math.round(Number(tokens) * TOKEN_UNIT)); // tokens -> base-unit string

// ---- Persisted account (localStorage) ----------------------------------------------------------
// The browser delegate's account = a 32-byte master seed kept in localStorage. The wasm derives all
// keys deterministically from it (wallet_keygen_seeded), so reloading restores the SAME account →
// SAME channel slot on re-import. SECURITY (testnet): this seed controls the account; it is stored
// in plaintext in this origin's localStorage. Use the "Clear saved account" button to wipe it.
const SEED_KEY = 'intmax_channel_seed';
const CH_KEY = 'intmax_channel_id'; // which channel this saved account joined (7 or 8)
function savedChannel() { return parseInt(localStorage.getItem(CH_KEY) || '', 10) || null; }
function saveChannel(ch) { localStorage.setItem(CH_KEY, String(ch)); }
function channelSeed() {
  let s = localStorage.getItem(SEED_KEY);
  if (!s) {
    const b = new Uint8Array(32); crypto.getRandomValues(b);
    s = '0x' + [...b].map((x) => x.toString(16).padStart(2, '0')).join('');
    localStorage.setItem(SEED_KEY, s);
  }
  return s;
}
function hasSavedAccount() { return !!localStorage.getItem(SEED_KEY); }
function clearSavedAccount() { localStorage.removeItem(SEED_KEY); localStorage.removeItem(CH_KEY); }

// On load, if a saved account exists AND the channel still has us as a member, restore the SAME slot.
async function tryRestore() {
  if (!hasSavedAccount()) return false;
  // Target the channel this saved account actually joined (so the restore queries the right one).
  if (savedChannel()) { activeCh = savedChannel(); if ($('joinChannel')) $('joinChannel').value = activeCh; }
  try {
    await call('keygenSeeded', { seed: channelSeed() });
    const snap = await api('/api/snapshot', null, 'GET');
    setChannelFrom(snap);
    const r = JSON.parse(await call('importChannel', { snapshotJson: snap }));
    mySlot = r.slot; showBalance(r);
    $('btnSend').disabled = false; $('btnRefresh').disabled = false;
    $('btnOpen').textContent = 'Re-join';
    log(`restored saved account → channel ${myChannel ?? '?'}, slot ${r.slot}, balance ${fmtAmt(r.balance)} (same key/slot across reloads)`, 'ok');
    return true;
  } catch (e) {
    log('saved account present but no matching channel to restore (relay reset or not yet joined) — click join to (re)create.', '');
    return false;
  }
}

// ---- worker plumbing (same protocol as wallet-worker.js) ----
const worker = new Worker('./wallet-worker.js', { type: 'module' });
const handlers = {};
function call(action, payload={}) {
  return new Promise((resolve, reject) => { handlers[action] = { resolve, reject }; worker.postMessage({ action, ...payload }); });
}
worker.onmessage = (e) => {
  const d = e.data;
  if (d.type === 'progress') { const s=$('status'); s.dataset.base = d.msg; s.textContent = `${d.msg} ${s.dataset.elapsed||''}`; return; }
  if (d.type === 'ready') { try { clearInterval(_initTick); } catch(e){} $('status').textContent='ready'; $('status').className='ready'; $('threads').textContent=d.threads; $('btnOpen').disabled=false; tryRestore(); return; }
  if (d.type === 'log') { return; }
  if (d.type === 'result') handlers[d.action]?.resolve(d.result);
  else if (d.type === 'error') handlers[d.action]?.reject(new Error(d.message));
};
worker.onerror = (e) => log('worker error: '+e.message, 'err');

async function api(pathname, body, method='POST') {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (method !== 'GET') opts.body = body;
  // Route every /api/* call to the active channel's relay directory.
  const url = pathname.startsWith('/api/')
    ? pathname + (pathname.includes('?') ? '&' : '?') + 'channel=' + activeCh
    : pathname;
  const r = await fetch(url, opts);
  const text = await r.text();
  if (!r.ok) throw new Error('relay '+pathname+': '+text);
  return text; // pass JSON text straight back into the wasm calls
}
function showBalance(r) {
  $('balance').textContent = fmtAmt(r.balance);
  $('balMeta').textContent = `· channel ${myChannel ?? '?'} · slot ${r.slot} · v${r.stateVersion} · ${r.canSend ? 'can send' : 'receive-only (refresh needed)'}`;
}

// Log the channel's REAL on-chain deposit backing (detail2 §F-1) — proof it is genuinely funded.
async function showBacking() {
  try {
    const b = JSON.parse(await api('/api/backing', null, 'GET'));
    const rollup = b.rollup || '', tx = b.depositTx || b.deposit_tx || '';
    log(`✓ backed by a REAL on-chain ETH deposit · fund ${fmtAmt(b.fund)}` + (rollup ? ` · IntmaxRollup ${rollup.slice(0,8)}… tx ${tx.slice(0,10)}…` : ''), 'ok');
  } catch (e) {
    log('no deposit backing yet — the relay runs setup-backing on first launch (~30s); reload shortly.', 'err');
  }
}

async function step(label, fn) {
  const t = Date.now();
  log(label + '…');
  const r = await fn();
  log(`  ${label} done (${((Date.now()-t)/1000).toFixed(1)}s)`);
  return r;
}
$('btnOpen').onclick = async () => {
  const t0 = Date.now();
  const tick = setInterval(() => { $('btnOpen').textContent = `Opening… ${Math.round((Date.now()-t0)/1000)}s`; }, 250);
  try {
    $('btnOpen').disabled = true;
    // Join the channel the user picked (default 7). Persist it so a reload restores the right channel.
    activeCh = parseInt($('joinChannel').value, 10) || 7;
    saveChannel(activeCh);
    log(`joining channel ${activeCh}…`);
    // Derive keys from the PERSISTED seed (localStorage) so reloading restores the SAME account/slot.
    await step('generate keys (from your saved account seed)', () => call('keygenSeeded', { seed: channelSeed() }));
    const contribution = await step('encrypt opening balance', () => call('genesisContribution', { balance: toBase($('openBalance').value) }));
    // The browser is the DELEGATE: the CLI's three members sign the genesis and return the
    // fully-signed snapshot directly — the delegate does NOT co-sign state.
    const snapshot = await step('CLI builds channel + 3 members co-sign genesis', () => api('/api/init', contribution));
    setChannelFrom(snapshot);
    const r = JSON.parse(await step('import & verify channel (as delegate)', () => call('importChannel', { snapshotJson: snapshot })));
    mySlot = r.slot;
    showBalance(r);
    log(`you are delegate slot ${r.slot} (co-signers: slots 0,1,2). Open another tab to join as slot ${r.slot+1}.`);
    $('btnSend').disabled = false;
    $('btnRefresh').disabled = false;
    log(`joined as delegate slot ${r.slot} in ${Math.round((Date.now()-t0)/1000)}s. balance ${fmtAmt(r.balance)}. (Open more tabs BEFORE sending — each becomes a new delegate slot.)`, 'ok');
  } catch (e) { log('open failed: '+e.message, 'err'); $('btnOpen').disabled=false; }
  clearInterval(tick);
  $('btnOpen').textContent = 'Join';
};

$('btnClear').onclick = () => {
  clearSavedAccount();
  log('cleared saved account from localStorage — reloading for a fresh account/slot.', '');
  setTimeout(() => location.reload(), 400);
};

async function attemptSend(to, amt) {
  // 1. Re-import the CURRENT channel head (picks up other tabs' sends + any joined delegates).
  const headSnap = await api('/api/snapshot', null, 'GET'); setChannelFrom(headSnap);
  let rr = JSON.parse(await call('importChannel', { snapshotJson: headSnap }));
  mySlot = rr.slot; showBalance(rr);
  // 2. If we received funds (receive-only), AUTO balance-refresh: re-encrypt our slot to clean digits
  //    (value preserved, proven) + members co-sign, so we can spend again.
  if (!rr.canSend) {
    log('  you received funds → balance-refresh (re-encrypt your slot) so you can send…');
    const refreshPayload = await call('refresh');
    const cosigned = await api('/api/refresh-cosign', refreshPayload);
    rr = JSON.parse(await call('finalize', { stateJson: cosigned }));
    mySlot = rr.slot; showBalance(rr);
    if (!rr.canSend) throw new Error('still receive-only after balance refresh');
    log(`  refreshed — balance ${rr.balance}, ready to send`, 'ok');
  }
  // 3. Send.
  const payload = await call('send', { recipientSlot: to, amount: toBase(amt) });
  log('other members co-signing…');
  const finalState = await api('/api/cosign', payload);
  return JSON.parse(await call('finalize', { stateJson: finalState }));
}

// Inter-channel send: debit our slot in channel `myCh`, credit slot `to` in channel `toCh`.
async function attemptInterChannelSend(toCh, to, amt) {
  // 1. Re-import our (source) channel head; refresh if we're receive-only so we can spend.
  const headSnap = await api('/api/snapshot', null, 'GET'); setChannelFrom(headSnap);
  let rr = JSON.parse(await call('importChannel', { snapshotJson: headSnap }));
  mySlot = rr.slot; showBalance(rr);
  if (!rr.canSend) {
    log('  you received funds → balance-refresh first so you can send…');
    const refreshPayload = await call('refresh');
    const cosigned = await api('/api/refresh-cosign', refreshPayload);
    rr = JSON.parse(await call('finalize', { stateJson: cosigned }));
    mySlot = rr.slot; showBalance(rr);
    if (!rr.canSend) throw new Error('still receive-only after balance refresh');
  }
  // 2. Read the DESTINATION channel B snapshot → the recipient slot's Regev pk + pk_g.
  const bSnapRaw = await fetch(`/api/snapshot?channel=${toCh}`).then(r => r.text());
  if (!bSnapRaw || bSnapRaw[0] !== '{') throw new Error(`destination channel ${toCh} not available`);
  const bSnap = JSON.parse(bSnapRaw);
  const bMember = (bSnap.members || []).find(m => m.slot === to);
  if (!bMember) throw new Error(`channel ${toCh} has no member at slot ${to}`);
  const destRecipientJson = JSON.stringify({ regevPk: bMember.regevPk, pkG: bMember.pkG });
  // 3. Build the debit + the cross-channel transfer descriptor (E-2 proof, in your browser).
  const built = JSON.parse(await call('sendInterChannel', { toChannel: toCh, toSlot: to, amount: toBase(amt), destRecipientJson }));
  // 4. SINGLE atomic transfer: the relay (which owns BOTH channels) co-signs A's debit against A's
  //    COMMITTED head AND credits channel B's slot in one command — no request-body aSignedState is
  //    ever trusted (CRITICAL-1). ?channel=myCh = the SOURCE channel A; the relay resolves B from the
  //    descriptor's destination id. Returns { aHead, bSnapshot }; nothing persists unless both legs pass.
  log(`  relay co-signing debit (ch${myChannel}) + crediting slot ${to} (ch${toCh}) atomically…`);
  const sendRes = await fetch(`/api/inter/send?channel=${myChannel}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ debitPayload: built.debitPayload, transferDescriptor: built.transferDescriptor }),
  });
  const sendTxt = await sendRes.text();
  if (!sendRes.ok) throw new Error('inter-channel transfer failed: ' + sendTxt);
  const transfer = JSON.parse(sendTxt);
  // 5. Commit OUR debit locally (channel A's co-signed new head returned by the relay).
  return JSON.parse(await call('finalize', { stateJson: JSON.stringify(transfer.aHead) }));
}

$('btnSend').onclick = async () => {
  const t0 = Date.now();
  const tick = setInterval(() => { $('btnSend').textContent = `Proving… ${Math.round((Date.now()-t0)/1000)}s`; }, 250);
  try {
    $('btnSend').disabled = true;
    const toCh = +$('toChannel').value, to = +$('toSlot').value, amt = $('amount').value;
    const myCh = myChannel ?? activeCh;
    let r;
    if (toCh !== myCh) {
      // INTER-CHANNEL: a different channel's slot is a different person — debit here, credit there.
      log(`inter-channel send ${amt} → channel ${toCh} slot ${to} (debit ch${myCh} → credit ch${toCh})…`);
      r = await attemptInterChannelSend(toCh, to, amt);
      showBalance(r);
      log(`sent ${amt} from channel ${myCh} to channel ${toCh} slot ${to} in ${Math.round((Date.now()-t0)/1000)}s. new balance ${fmtAmt(r.balance)}`, 'ok');
    } else {
      // INTRA-CHANNEL: same channel.
      if (to === mySlot) throw new Error(`cannot send to yourself (channel ${myCh}, slot ${mySlot})`);
      log(`Regev E-1 proof + your BabyBear hash-sig ZK proof for ${amt} → channel ${toCh} slot ${to}…`);
      try {
        r = await attemptSend(to, amt);
      } catch (e) {
        if (/does not extend the current head/.test(e.message)) {
          log('  head moved (another tab sent first) — re-importing + retrying…');
          r = await attemptSend(to, amt);
        } else { throw e; }
      }
      showBalance(r);
      log(`sent ${amt} to slot ${to} in ${Math.round((Date.now()-t0)/1000)}s. new balance ${fmtAmt(r.balance)}`, 'ok');
    }
  } catch (e) { log('send failed: '+e.message, 'err'); }
  clearInterval(tick);
  $('btnSend').textContent = 'Send';
  $('btnSend').disabled = false;
};

$('btnRefresh').onclick = async () => {
  try {
    $('btnRefresh').disabled = true;
    const latest = await api('/api/snapshot', null, 'GET');
    setChannelFrom(latest);
    const r = JSON.parse(await call('importChannel', { snapshotJson: latest }));
    mySlot = r.slot;
    showBalance(r);
    log(`refreshed: you are slot ${r.slot}, balance ${fmtAmt(r.balance)}` + (r.canSend ? '' : ' (you received funds — a balance refresh is needed before you can send again)'), 'ok');
  } catch (e) { log('refresh failed: '+e.message, 'err'); }
  $('btnRefresh').disabled = false;
};

// Thread count: each rayon thread spawns a Web Worker that re-instantiates the wasm, so on a phone
// (weaker CPU + tighter memory) a high core count makes "initializing" drag. Cap it — fewer threads
// = much faster init; proving is a bit slower but mobile proving is the secondary path anyway.
function pickThreads() {
  const hwc = navigator.hardwareConcurrency || 4;
  const isMobile = (navigator.userAgentData && navigator.userAgentData.mobile) || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  // Desktop: use ALL cores (proving speed matters). Mobile: cap so "initializing" (per-thread worker
  // spawn) doesn't drag and memory stays bounded.
  return isMobile ? Math.max(1, Math.min(hwc, 4)) : hwc;
}
// Live elapsed timer next to the status while initializing (so the wait is legible on mobile).
const _initT0 = Date.now();
const _initTick = setInterval(() => {
  const s = $('status');
  if (s && s.className !== 'ready') s.dataset.elapsed = `(${Math.round((Date.now()-_initT0)/1000)}s)`;
  if (s && s.className !== 'ready' && s.dataset.base) s.textContent = `${s.dataset.base} ${s.dataset.elapsed}`;
}, 500);
worker.postMessage({ action: 'init', threads: pickThreads() });
showBacking();
</script>
</body>
</html>
