<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>INTMAX3 Channel Wallet — Live</title>
<style>
  :root { --bg:#0f1419; --panel:#1a2129; --fg:#e6edf3; --muted:#8b949e; --accent:#2f81f7; --ok:#3fb950; --err:#f85149; --border:#30363d; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--bg); color:var(--fg); }
  header { padding:16px 22px; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:baseline; flex-wrap:wrap; }
  h1 { font-size:17px; margin:0; }
  #status { color:var(--muted); } #status.ready { color:var(--ok); }
  main { max-width:760px; margin:0 auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .panel h2 { font-size:13px; margin:0 0 12px; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; }
  .bal { font-size:34px; font-weight:600; }
  .bal small { font-size:13px; color:var(--muted); font-weight:400; }
  label { color:var(--muted); font-size:13px; display:block; margin:10px 0 3px; }
  input { width:100%; background:#0d1117; color:var(--fg); border:1px solid var(--border); border-radius:7px; padding:9px; font:inherit; }
  .row { display:flex; gap:12px; } .row > * { flex:1; }
  button { background:var(--accent); color:#fff; border:0; border-radius:7px; padding:11px 18px; font:inherit; font-weight:600; cursor:pointer; margin-top:12px; width:100%; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  .members { color:var(--muted); font-size:13px; margin-top:8px; }
  #log { background:#0d1117; border:1px solid var(--border); border-radius:10px; padding:12px; height:200px; overflow:auto; white-space:pre-wrap; font-size:13px; }
  .hint { color:var(--muted); font-size:13px; }
  .ok { color:var(--ok); } .err { color:var(--err); }
</style>
</head>
<body>
<header>
  <h1>INTMAX3 Channel Wallet</h1>
  <span id="status">initializing…</span>
  <span class="hint">threads <span id="threads">?</span> · proving runs in your browser</span>
</header>
<main>
  <section class="panel">
    <h2>1 · Join the Intmax channel</h2>
    <input id="openBalance" type="number" value="50" readonly />
    <div class="row">
      <button id="btnOpen" disabled>Join</button>
      <button id="btnClear">Clear</button>
    </div>
  </section>

  <section class="panel">
    <h2>2 · Balance</h2>
    <div class="bal"><span id="balance">—</span> <small id="balMeta"></small></div>
    <button id="btnRefresh" disabled>Refresh</button>
  </section>

  <section class="panel">
    <h2>3 · Send</h2>
    <div class="row">
      <input id="toChannel" type="number" value="7" title="destination channel ID (same as this channel = intra-channel; different = inter-channel)" />
      <input id="toSlot" type="number" value="0" />
      <input id="amount" type="number" step="0.000001" value="7" />
    </div>
    <button id="btnSend" disabled>Send</button>
  </section>

  <div id="log"></div>
</main>

<script type="module">
const $ = (id) => document.getElementById(id);
const log = (m, cls='') => { const l=$('log'); l.innerHTML += `\n<span class="${cls}">${m}</span>`; l.scrollTop=l.scrollHeight; };
let mySlot = 0;

// Amounts: the protocol stores integer BASE UNITS; 1 token = 10^6 (TOKEN_DECIMALS = 6).
const TOKEN_UNIT = 1000000;
const fmtAmt = (base) => (Number(base) / TOKEN_UNIT).toFixed(6);            // base units -> "x.xxxxxx"
const toBase = (tokens) => String(Math.round(Number(tokens) * TOKEN_UNIT)); // tokens -> base-unit string

// ---- Persisted account (localStorage) ----------------------------------------------------------
// The browser delegate's account = a 32-byte master seed kept in localStorage. The wasm derives all
// keys deterministically from it (wallet_keygen_seeded), so reloading restores the SAME account →
// SAME channel slot on re-import. SECURITY (testnet): this seed controls the account; it is stored
// in plaintext in this origin's localStorage. Use the "Clear saved account" button to wipe it.
const SEED_KEY = 'intmax_channel_seed';
function channelSeed() {
  let s = localStorage.getItem(SEED_KEY);
  if (!s) {
    const b = new Uint8Array(32); crypto.getRandomValues(b);
    s = '0x' + [...b].map((x) => x.toString(16).padStart(2, '0')).join('');
    localStorage.setItem(SEED_KEY, s);
  }
  return s;
}
function hasSavedAccount() { return !!localStorage.getItem(SEED_KEY); }
function clearSavedAccount() { localStorage.removeItem(SEED_KEY); }

// On load, if a saved account exists AND the channel still has us as a member, restore the SAME slot.
async function tryRestore() {
  if (!hasSavedAccount()) return false;
  try {
    await call('keygenSeeded', { seed: channelSeed() });
    const snap = await api('/api/snapshot', null, 'GET');
    const r = JSON.parse(await call('importChannel', { snapshotJson: snap }));
    mySlot = r.slot; showBalance(r);
    $('btnSend').disabled = false; $('btnRefresh').disabled = false;
    $('btnOpen').textContent = 'Re-join';
    log(`restored saved account at slot ${r.slot} (same key/slot across reloads)`);
    log(`restored saved account → slot ${r.slot}, balance ${r.balance}`, 'ok');
    return true;
  } catch (e) {
    log('saved account present but no matching channel to restore (relay reset or not yet joined) — click join to (re)create.', '');
    return false;
  }
}

// ---- worker plumbing (same protocol as wallet-worker.js) ----
const worker = new Worker('./wallet-worker.js', { type: 'module' });
const handlers = {};
function call(action, payload={}) {
  return new Promise((resolve, reject) => { handlers[action] = { resolve, reject }; worker.postMessage({ action, ...payload }); });
}
worker.onmessage = (e) => {
  const d = e.data;
  if (d.type === 'ready') { $('status').textContent='ready'; $('status').className='ready'; $('threads').textContent=d.threads; $('btnOpen').disabled=false; tryRestore(); return; }
  if (d.type === 'log') { return; }
  if (d.type === 'result') handlers[d.action]?.resolve(d.result);
  else if (d.type === 'error') handlers[d.action]?.reject(new Error(d.message));
};
worker.onerror = (e) => log('worker error: '+e.message, 'err');

async function api(pathname, body, method='POST') {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (method !== 'GET') opts.body = body;
  const r = await fetch(pathname, opts);
  const text = await r.text();
  if (!r.ok) throw new Error('relay '+pathname+': '+text);
  return text; // pass JSON text straight back into the wasm calls
}
function showBalance(r) {
  $('balance').textContent = fmtAmt(r.balance);
  $('balMeta').textContent = `· slot ${r.slot} · v${r.stateVersion} · ${r.canSend ? 'can send' : 'receive-only (refresh needed)'}`;
}

// Log the channel's REAL on-chain deposit backing (detail2 §F-1) — proof it is genuinely funded.
async function showBacking() {
  try {
    const b = JSON.parse(await api('/api/backing', null, 'GET'));
    const rollup = b.rollup || '', tx = b.depositTx || b.deposit_tx || '';
    log(`✓ backed by a REAL on-chain ETH deposit · fund ${fmtAmt(b.fund)}` + (rollup ? ` · IntmaxRollup ${rollup.slice(0,8)}… tx ${tx.slice(0,10)}…` : ''), 'ok');
  } catch (e) {
    log('no deposit backing yet — the relay runs setup-backing on first launch (~30s); reload shortly.', 'err');
  }
}

async function step(label, fn) {
  const t = Date.now();
  log(label + '…');
  const r = await fn();
  log(`  ${label} done (${((Date.now()-t)/1000).toFixed(1)}s)`);
  return r;
}
$('btnOpen').onclick = async () => {
  const t0 = Date.now();
  const tick = setInterval(() => { $('btnOpen').textContent = `Opening… ${Math.round((Date.now()-t0)/1000)}s`; }, 250);
  try {
    $('btnOpen').disabled = true;
    // Derive keys from the PERSISTED seed (localStorage) so reloading restores the SAME account/slot.
    await step('generate keys (from your saved account seed)', () => call('keygenSeeded', { seed: channelSeed() }));
    const contribution = await step('encrypt opening balance', () => call('genesisContribution', { balance: toBase($('openBalance').value) }));
    // The browser is the DELEGATE: the CLI's three members sign the genesis and return the
    // fully-signed snapshot directly — the delegate does NOT co-sign state.
    const snapshot = await step('CLI builds channel + 3 members co-sign genesis', () => api('/api/init', contribution));
    const r = JSON.parse(await step('import & verify channel (as delegate)', () => call('importChannel', { snapshotJson: snapshot })));
    mySlot = r.slot;
    showBalance(r);
    log(`you are delegate slot ${r.slot} (co-signers: slots 0,1,2). Open another tab to join as slot ${r.slot+1}.`);
    $('btnSend').disabled = false;
    $('btnRefresh').disabled = false;
    log(`joined as delegate slot ${r.slot} in ${Math.round((Date.now()-t0)/1000)}s. balance ${r.balance}. (Open more tabs BEFORE sending — each becomes a new delegate slot.)`, 'ok');
  } catch (e) { log('open failed: '+e.message, 'err'); $('btnOpen').disabled=false; }
  clearInterval(tick);
  $('btnOpen').textContent = 'Join';
};

$('btnClear').onclick = () => {
  clearSavedAccount();
  log('cleared saved account from localStorage — reloading for a fresh account/slot.', '');
  setTimeout(() => location.reload(), 400);
};

async function attemptSend(to, amt) {
  // 1. Re-import the CURRENT channel head (picks up other tabs' sends + any joined delegates).
  let rr = JSON.parse(await call('importChannel', { snapshotJson: await api('/api/snapshot', null, 'GET') }));
  mySlot = rr.slot; showBalance(rr);
  // 2. If we received funds (receive-only), AUTO balance-refresh: re-encrypt our slot to clean digits
  //    (value preserved, proven) + members co-sign, so we can spend again.
  if (!rr.canSend) {
    log('  you received funds → balance-refresh (re-encrypt your slot) so you can send…');
    const refreshPayload = await call('refresh');
    const cosigned = await api('/api/refresh-cosign', refreshPayload);
    rr = JSON.parse(await call('finalize', { stateJson: cosigned }));
    mySlot = rr.slot; showBalance(rr);
    if (!rr.canSend) throw new Error('still receive-only after balance refresh');
    log(`  refreshed — balance ${rr.balance}, ready to send`, 'ok');
  }
  // 3. Send.
  const payload = await call('send', { recipientSlot: to, amount: toBase(amt) });
  log('other members co-signing…');
  const finalState = await api('/api/cosign', payload);
  return JSON.parse(await call('finalize', { stateJson: finalState }));
}

$('btnSend').onclick = async () => {
  const t0 = Date.now();
  const tick = setInterval(() => { $('btnSend').textContent = `Proving… ${Math.round((Date.now()-t0)/1000)}s`; }, 250);
  try {
    $('btnSend').disabled = true;
    const to = +$('toSlot').value, amt = $('amount').value;
    if (to === mySlot) throw new Error('cannot send to yourself (slot '+mySlot+')');
    log(`Regev E-1 proof (~3ms) + your BabyBear hash-sig ZK proof for ${amt} → slot ${to}…`);
    let r;
    try {
      r = await attemptSend(to, amt);
    } catch (e) {
      // Lost the head race to another tab (it advanced the head between our re-import and co-sign).
      // Re-import the new head and rebuild once.
      if (/does not extend the current head/.test(e.message)) {
        log('  head moved (another tab sent first) — re-importing + retrying…');
        r = await attemptSend(to, amt);
      } else { throw e; }
    }
    showBalance(r);
    log(`sent ${amt} to slot ${to} in ${Math.round((Date.now()-t0)/1000)}s. new balance ${fmtAmt(r.balance)}`, 'ok');
  } catch (e) { log('send failed: '+e.message, 'err'); }
  clearInterval(tick);
  $('btnSend').textContent = 'Send';
  $('btnSend').disabled = false;
};

$('btnRefresh').onclick = async () => {
  try {
    $('btnRefresh').disabled = true;
    const latest = await api('/api/snapshot', null, 'GET');
    const r = JSON.parse(await call('importChannel', { snapshotJson: latest }));
    mySlot = r.slot;
    showBalance(r);
    log(`refreshed: you are slot ${r.slot}, balance ${r.balance}` + (r.canSend ? '' : ' (you received funds — a balance refresh is needed before you can send again)'), 'ok');
  } catch (e) { log('refresh failed: '+e.message, 'err'); }
  $('btnRefresh').disabled = false;
};

worker.postMessage({ action: 'init', threads: navigator.hardwareConcurrency || 4 });
showBacking();
</script>
</body>
</html>
