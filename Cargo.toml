[package]
name = "intmax3-zkp"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
plonky2 = { git = "https://github.com/InternetMaximalism/Lita-Plonky2.git", branch = "wasm-zkp3", default-features = false, features = ["parallel", "std"] }
starky = { git = "https://github.com/InternetMaximalism/Lita-Plonky2.git", package = "starky", branch = "wasm-zkp3", default-features = false, features = ["parallel", "std"] }
plonky2_u32 = { git = "https://github.com/lita-xyz/plonky2-u32.git", branch = "wasm", default-features = false }
plonky2_bn254 = { git = "https://github.com/lita-xyz/plonky2_bn254.git", branch = "wasm", default-features = false }
plonky2_keccak = { git = "https://github.com/lita-xyz/plonky2_keccak.git", branch = "wasm", default-features = false }
sphincsplus-circuits = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git" }
sphincsplus-params = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git" }
sphincsplus-poseidon = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git" }
hex = "0.4.3"
rand = "0.8.5"
thiserror = "2.0.17"
num-bigint = "0.4.6"
num = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
log = "0.4.28"
ff = { package = "ff", version = "0.13", features = ["derive"] }
anyhow = "1.0.100"
lazy_static = "1.5.0"
bincode = { version = "2.0.1", features = ["serde"] }

# Threading
rayon = "1.8"
wasm-bindgen-rayon = { version = "1.2", features = ["no-bundler"] }

# WASM bindings
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"

# Web APIs
web-sys = { version = "0.3", features = ["console", "Performance", "Window"] }
js-sys = "0.3"

# Error handling
console_error_panic_hook = "0.1.7"

# Random numbers (WASM-compatible)
getrandom = { version = "0.3", features = ["wasm_js"] }

# Async support
futures = "0.3"

[features]
gpu_merkle = ["plonky2/gpu_merkle", "starky/gpu_merkle", "plonky2_keccak/gpu_merkle"]

[patch."https://github.com/InternetMaximalism/polygon-plonky2.git"]
plonky2 = { git = "https://github.com/InternetMaximalism/Lita-Plonky2.git", branch = "wasm-zkp3" }

[patch."https://github.com/lita-xyz/Plonky2.git"]
plonky2 = { git = "https://github.com/InternetMaximalism/Lita-Plonky2.git", branch = "wasm-zkp3" }

[dev-dependencies]
criterion = { version = "0.5", default-features = false }
once_cell = "1.20"
wasm-bindgen-test = "0.3"
web-time = "0.2"

[[bench]]
name = "proof_bench"
harness = false

[[bench]]
name = "degree_report"
harness = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O4", "--strip-debug", "--enable-bulk-memory", "--enable-simd"]
