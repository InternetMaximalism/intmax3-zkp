[package]
name = "intmax3-zkp"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
plonky2 = { git = "https://github.com/InternetMaximalism/polygon-plonky2.git", branch = "main", default-features = false, features = ["parallel", "std"] }
starky = { git = "https://github.com/InternetMaximalism/polygon-plonky2.git", package = "starky", branch = "main", default-features = false, features = ["parallel", "std"] }
plonky2_u32 = { git = "https://github.com/InternetMaximalism/plonky2-u32.git", branch = "wasm-main", default-features = false }
# SECURITY REGRESSION (TEMPORARY): the `not-constrain-bn254-stark` /
# `not-constrain-keccak` features disable the in-circuit STARK proofs of
# bn254 / keccak witness correctness. They are required here only because the
# upstream sibling crates have not been migrated to plonky2 1.x's starky API
# (multi-stark CTL flow). With the features on, the prover-side witness
# generators still compute correct outputs but the in-circuit constraints are
# absent — a malicious prover can lie. The application layer (intmax3 onchain
# state hashes, validity proof) MUST be re-evaluated for soundness once the
# starky 1.x migration of plonky2_keccak / plonky2_bn254 lands. Tracked in:
#   https://github.com/InternetMaximalism/plonky2_keccak  (wasm-main: gated)
#   https://github.com/InternetMaximalism/plonky2_bn254   (wasm-main: gated)
plonky2_bn254 = { git = "https://github.com/InternetMaximalism/plonky2_bn254.git", branch = "wasm-main", default-features = false, features = ["not-constrain-bn254-stark"] }
plonky2_keccak = { git = "https://github.com/InternetMaximalism/plonky2_keccak.git", branch = "wasm-main", default-features = false, features = ["not-constrain-keccak"] }
sphincsplus-circuits = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git", branch = "wasm-main" }
sphincsplus-params = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git", branch = "wasm-main" }
sphincsplus-poseidon = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git", branch = "wasm-main" }
hex = "0.4.3"
rand = "0.8.5"
thiserror = "2.0.17"
num-bigint = "0.4.6"
num = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
log = "0.4.28"
ff = { package = "ff", version = "0.13", features = ["derive"] }
anyhow = "1.0.100"
lazy_static = "1.5.0"
bincode = { version = "2.0.1", features = ["serde"] }
clap = { version = "4.5", features = ["derive"] }

# WHIR post-quantum wrapper (optional, native-only)
whir = { git = "https://github.com/leohio/whir", features = ["parallel"], optional = true }
ark-ff = { version = "0.5", features = ["asm", "std"], optional = true }
ark-std = { version = "0.5", features = ["std"], optional = true }
sha3 = { version = "0.10", optional = true }
ciborium = { version = "0.2", optional = true }

# Threading
rayon = "1.8"
wasm-bindgen-rayon = { version = "1.2", features = ["no-bundler"] }

# WASM bindings
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"

# Web APIs
web-sys = { version = "0.3", features = ["console", "Performance", "Window"] }
js-sys = "0.3"

# Error handling
console_error_panic_hook = "0.1.7"

# Random numbers (WASM-compatible)
getrandom = { version = "0.3", features = ["wasm_js"] }

# Async support
futures = "0.3"

# Timing (WASM-compatible)
web-time = "0.2"

[features]
default = []
whir = ["dep:whir", "dep:ark-ff", "dep:ark-std", "dep:sha3", "dep:ciborium"]
# `plonky2_keccak/wasm` does not expose a `gpu_merkle` feature flag, so we only
# forward it to plonky2 + starky (which do).
gpu_merkle = ["plonky2/gpu_merkle", "starky/gpu_merkle"]

# Sibling repos (plonky2_u32 / plonky2_bn254 / plonky2_keccak) reference
# `polygon-plonky2.git?branch=wasm`. We unify everything onto `main`, which
# carries both the WHIR-bridge API exports (prove_with_polys / ProverPolynomials
# / pub SelectorsInfo fields) and Lita's WebGPU + WASM stack.

[dev-dependencies]
criterion = { version = "0.5", default-features = false }
once_cell = "1.20"
wasm-bindgen-test = "0.3"
web-time = "0.2"

[[bench]]
name = "proof_bench"
harness = false

[[bench]]
name = "degree_report"
harness = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"  # Use "abort" for production (smaller binary), "unwind" for debugging

# `cargo test --release --tests` builds the integration test harnesses with the
# `release` profile. `wasm_bindgen_futures` and a few other WASM-side deps in
# the workspace require `panic = "abort"`, so we force test builds to abort too
# (otherwise we hit "requires panic strategy abort which is incompatible with
# unwind"). Backtraces are unaffected at the test binary level.
[profile.test]
panic = "abort"

[profile.bench]
panic = "abort"

# Post-build WASM binary optimization pass (runs after compilation)
[package.metadata.wasm-pack.profile.release]
wasm-opt = [
    "-O4",                  # Most aggressive optimization (smaller + faster WASM)
    "--enable-bulk-memory",  # Bulk memory ops for faster memcpy/memset
    "--enable-simd"          # SIMD instructions for parallel 128-bit math
]
