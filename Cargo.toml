[package]
name = "intmax3-zkp"
version = "0.1.0"
edition = "2024"

[dependencies]
# All plonky2 ecosystem uses mleintroduction branch (rebased on wasm)
plonky2 = { git = "https://github.com/InternetMaximalism/polygon-plonky2.git", branch = "mleintroduction", default-features = false, features = [
    "parallel",
] }
plonky2_mle = { git = "https://github.com/InternetMaximalism/polygon-plonky2.git", branch = "mleintroduction" }
# These crates depend on polygon-plonky2 wasm branch internally;
# [patch] below redirects their transitive plonky2 dep to mleintroduction.
plonky2_u32 = { git = "https://github.com/InternetMaximalism/plonky2-u32.git", branch = "mleintroduction", default-features = false }
plonky2_bn254 = { git = "https://github.com/InternetMaximalism/plonky2_bn254", branch = "mleintroduction", default-features = false }
plonky2_keccak = { git = "https://github.com/InternetMaximalism/plonky2_keccak", branch = "mleintroduction", default-features = false }

sphincsplus-circuits = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git", branch = "mleintroduction" }
sphincsplus-params = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git", branch = "mleintroduction" }
sphincsplus-poseidon = { git = "https://github.com/InternetMaximalism/aggregated_SPHINCS_plus.git", branch = "mleintroduction" }
keccak-hash = "0.8.0"
hex = "0.4.3"
rand = "0.8.5"
thiserror = "2.0.17"
num-bigint = "0.4.6"
num = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
log = "0.4.28"
ff = { package = "ff", version = "0.13", features = ["derive"] }
anyhow = "1.0.100"
lazy_static = "1.5.0"
bincode = { version = "2.0.1", features = ["serde"] }
clap = { version = "4.5", features = ["derive"] }

[features]
default = []


[dev-dependencies]
criterion = { version = "0.5", default-features = false }
once_cell = "1.20"
wasm-bindgen = "0.2"
wasm-bindgen-test = "0.3"
web-time = "0.2"
js-sys = "0.3"

[[bench]]
name = "proof_bench"
harness = false

[[bench]]
name = "degree_report"
harness = false

# Force all transitive plonky2 deps to use the local submodule pinned at b3e0f051.
# Branch HEAD (fd33b3dc) merged upstream main which bumped plonky2 0.2.2 -> 1.1.0
# and changed the PartialWitness::set_target API to return Result, but plonky2_u32
# / plonky2_bn254 / plonky2_keccak haven't been updated for the new API. b3e0f051
# is the latest commit with the Solidity evaluationPoint binding security fix and
# remains API-compatible with cb0f0467 plonky2_u32.
[patch."https://github.com/InternetMaximalism/polygon-plonky2.git"]
plonky2 = { path = "contracts/lib/polygon-plonky2/plonky2" }
plonky2_field = { path = "contracts/lib/polygon-plonky2/field" }
plonky2_util = { path = "contracts/lib/polygon-plonky2/util" }
plonky2_maybe_rayon = { path = "contracts/lib/polygon-plonky2/maybe_rayon" }
plonky2_mle = { path = "contracts/lib/polygon-plonky2/mle" }
starky = { path = "contracts/lib/polygon-plonky2/starky" }

