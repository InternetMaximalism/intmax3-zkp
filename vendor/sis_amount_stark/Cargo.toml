[package]
name = "sis_amount_stark"
version = "0.1.0"
edition = "2024"

[features]
default = []
fast-benchmark = []

[dependencies]
p3-air = "0.5.3"
p3-challenger = "0.5.3"
p3-commit = "0.5.3"
p3-dft = "0.5.3"
p3-field = "0.5.3"
p3-fri = "0.5.3"
p3-goldilocks = "0.5.3"
p3-matrix = "0.5.3"
p3-merkle-tree = "0.5.3"
p3-symmetric = "0.5.3"
p3-uni-stark = "0.5.3"
postcard = { version = "1", features = ["alloc"] }
rayon = "1"
serde = { version = "1", features = ["derive"] }
thiserror = "1"

[dev-dependencies]
proptest = "1"
